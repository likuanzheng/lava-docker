---
masters:
  - name: master1
    host: local
    webinterface_port: 10070
    http_fqdn: "http://*:10070"
    allowed_hosts:
      - "*"
    users:
      - name: ywyh
        token: longrandomtokenadmin
        password: ywyh@204
        superuser: true
        staff: true
    custom_volumes:
      - "../../user-data/device-types:/root/device-types"
slaves:
  - name: lab-slave-0
    host: local
    remote_master: master1
    remote_user: ywyh
    dispatcher_ip: 192.168.32.9
    extra_actions:
      - "apt-get install -y mosquitto-clients"
    custom_volumes:
      - "../../user-data/jobs:/root/jobs"
      - "../../user-data/tftp:/var/lib/lava/dispatcher/tmp/tftp"

boards:
  - name: qemu-01
    type: qemu
    slave: lab-slave-0
    kvm: true
  - name: xt-c100-001
    type: xt-c100
    slave: lab-slave-0
    connection_command: telnet 192.168.32.121 12000
    pdu_generic:
      power_on_command: mosquitto_pub -h 192.168.32.9 -u ywyh -P 'ywyh@204' -t b0a604429004-set -m '{"key":1,"messageId":"","type":"event"}'
      power_off_command: mosquitto_pub -h 192.168.32.9 -u ywyh -P 'ywyh@204' -t b0a604429004-set -m '{"key":0,"messageId":"","type":"event"}'
      hard_reset_command: "bash /root/jobs/mqtt-reset.sh"
