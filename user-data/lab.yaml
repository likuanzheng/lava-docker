# 实验室基础设施配置（非 per-device）
#
# 与 user-data/devices/<name>.yaml 一起，由 gen-boards.py 拼装成根目录 boards.yaml
# （lavalab-gen 的输入，已 .gitignore，是生成产物）。
#
# - masters / slaves：照搬给 lavalab-gen，masters↔slaves 通过 remote_master/remote_user/token 耦合。
# - power_defaults：gen-device-dicts.py 使用，把每台设备的 power.mqtt_topic
#   展开成设备 dict 的 power_on_command / hard_reset_command（全内联，无脚本文件）。
---
power_defaults:
  mqtt_host: 192.168.32.9
  mqtt_user: ywyh
  mqtt_pass: 'ywyh@204'

masters:
  - name: master1
    host: local
    webinterface_port: 10070
    http_fqdn: "http://*:10070"
    allowed_hosts:
      - "*"
    users:
      - name: ywyh
        token: longrandomtokenadmin
        password: ywyh@204
        superuser: true
        staff: true
    custom_volumes:
      - "../../user-data/device-types:/root/device-types"

slaves:
  - name: lab-slave-0
    host: local
    remote_master: master1
    remote_user: ywyh
    dispatcher_ip: 192.168.32.9
    extra_actions:
      - "apt-get install -y mosquitto-clients"
      # socat（串口无回显连接，健康检查 auto_login 必需）。tuna 镜像对该包偶发 403，
      # apt 装不上时回退到 aliyun .deb（版本按 bookworm 固定）。
      - "apt-get install -y socat || (cd /tmp && wget -q http://mirrors.aliyun.com/debian/pool/main/s/socat/socat_1.7.4.4-2_amd64.deb && dpkg -i socat_1.7.4.4-2_amd64.deb && rm -f socat_1.7.4.4-2_amd64.deb)"
    custom_volumes:
      # 仅留 job 运行时持续要读的：tftp(供启动/备份落点)。复位/开机命令已内联进设备 dict，无需挂 power。
      # 设备字典(devices/tags/aliases/deviceinfo)不挂载——reload 时由 docker cp 临时注入，
      # 注册后内容已存进 master DB（见 scripts/push-device-dicts.sh / scripts/reload-*.sh）。
      - "../../user-data/tftp:/var/lib/lava/dispatcher/tmp/tftp"
