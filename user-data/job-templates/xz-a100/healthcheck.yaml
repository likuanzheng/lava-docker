# device-type 级健康检查：LAVA 按频率自动在每台 xz-a100 上跑，过=Health Good、挂=Bad 进维护。
# 注入位置：master:/etc/lava-server/dispatcher-config/health-checks/xz-a100.yaml（由 scripts/reload-health-checks.sh）。
#
# 启动方式：只复位电源、等板子从本地系统(nvme)自启到登录符 → 登录 → 跑命令。
#   不 TFTP、不引导 RAM 系统，因此完全【设备无关】：一份文件覆盖任意数量 A100。
#
# 检查项：复位(LAVA 起 job 即跑设备 dict 内联的 hard_reset)→串口/启动到控制台(等登录符)
#         →auto_login(ywyh/ywyh@204)登录→内核保活(uname -a)→存储(ls /dev/nvme0n1)。
#
# ⚠ 登录交给 boot 的 auto_login（LAVA 标准机制）——别在 interactive 里手写等 'login:'：
#   boot 的 auto-login-action 会先消费掉登录符，interactive 再等就死等超时（orin-kit 踩过，见 [[lava-health-check]]）。
# ⚠ 设备连接必须用 socat（非 telnet）：telnet 的回显/协商会打乱 auto_login → Login incorrect（orin-kit 实测）。
#   见 devices/xz-a100-001-*.yaml 的 connection_command。
# ⚠ 提示符仍是【占位】，待 A100 真机确认（orin-kit 已真机验证、A100 尚未）：
#   login_prompt 'login:'、password_prompt 'Password:'、shell 符 'ywyh@'（应为 'ywyh@<hostname>'）。
device_type: xz-a100
job_name: xz-a100 health check
timeouts:
  job:
    minutes: 8
  action:
    minutes: 5
priority: high
visibility: public

actions:
- boot:
    method: minimal
    auto_login:
      login_prompt: 'login:'          # CONFIRM 占位：上电自启后的登录提示符
      username: ywyh
      password_prompt: 'Password:'    # CONFIRM 占位：密码提示符
      password: ywyh@204
    prompts:
      - 'ywyh@'                        # CONFIRM 占位：登录后 shell 符（宜改 'ywyh@<hostname>'）
    timeout:
      minutes: 5

- test:
    timeout:
      minutes: 3
    interactive:
    - name: health-asserts
      prompts: ['ywyh@']              # CONFIRM 占位：同上 shell 符
      script:
      - command: "uname -a"
        name: kernel-alive
        successes:
        - message: "Linux"
        failures:
        - message: "command not found"
          exception: JobError
          error: "内核保活检查失败"

      - command: "ls /dev/nvme0n1"
        name: storage-present
        successes:
        - message: "/dev/nvme0n1"
        failures:
        - message: "No such file"
          exception: JobError
          error: "存储 /dev/nvme0n1 不存在（备份/刷写 job 会失败）"
